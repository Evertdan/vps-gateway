name: CD - Release and Deploy

on:
  push:
    tags:
      - 'v*'

env:
  VPS_IP: 195.26.244.180
  VPS_USER: usuario
  DOMAIN: vps1.dgetahgo.edu.mx

jobs:
  # ============================================
  # Job 1: Create Release
  # ============================================
  release:
    name: 🏷️ Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Changelog
        id: changelog
        run: |
          echo "changelog=$(git log --pretty=format:'- %s' $(git describe --tags --abbrev=0 @^)..@)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Changes in this Release
            ${{ steps.changelog.outputs.changelog }}

            ## Deployment
            This release has been automatically deployed to the VPS.
          draft: false
          prerelease: false

  # ============================================
  # Job 2: Deploy to VPS
  # ============================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ env.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy Scripts
        run: |
          scp -r scripts/* ${{ env.VPS_USER }}@${{ env.VPS_IP }}:/opt/projects/scripts/
          ssh ${{ env.VPS_USER }}@${{ env.VPS_IP }} "chmod +x /opt/projects/scripts/*.sh"

      - name: Deploy Terraform
        run: |
          scp -r terraform/* ${{ env.VPS_USER }}@${{ env.VPS_IP }}:/opt/projects/terraform/

      - name: Verify Deployment
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_IP }} "ls -la /opt/projects/scripts/"

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="✅ SUCCESS"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="❌ FAILED"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🚀 *Release Deployment*%0A%0AVersion: ${{ github.ref }}%0AStatus: $STATUS%0A%0AChanges deployed to VPS%0A%0A🔗 ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}" \
            -d "parse_mode=Markdown" 2>/dev/null || true

  # ============================================
  # Job 3: Update Documentation
  # ============================================
  update-docs:
    name: 📚 Update Documentation
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Last Deployed
        run: |
          echo "Last deployed: $(date)" >> DEPLOYMENTS.md

      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add DEPLOYMENTS.md
          git commit -m "docs: Update deployment timestamp" || exit 0
          git push