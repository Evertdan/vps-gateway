name: CI - Validate and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.7.0"

jobs:
  # ============================================
  # Job 1: Lint and Validate Code
  # ============================================
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint Shell Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint.yml

  # ============================================
  # Job 2: Validate Terraform
  # ============================================
  terraform-validate:
    name: 🏗️ Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('terraform/**/*.tf') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform Plan (Dry Run)
        run: |
          cd terraform
          terraform plan -input=false -out=tfplan.binary
          terraform show -no-color tfplan.binary > ../terraform-plan.txt
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload Terraform Plan Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform-plan.txt

      - name: Comment Terraform Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('terraform-plan.txt', 'utf8');
            const limit = 6000;
            if (plan.length > limit) {
              plan = plan.slice(0, limit) + '\n... (plan truncado)';
            }
            const bodyLines = [
              '### Terraform Plan (preview)',
              '',
              '<details><summary>Mostrar plan</summary>',
              '',
              '```',
              plan,
              '```',
              '',
              '</details>'
            ];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.name,
              issue_number: context.issue.number,
              body: bodyLines.join('\n')
            });

  # ============================================
  # Job 3: Security Scan
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # Job 4: Test Scripts
  # ============================================
  test-scripts:
    name: 🧪 Test Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test Script Syntax
        run: |
          for script in scripts/*.sh; do
            echo "Testing $script"
            bash -n "$script"
          done

      - name: Check Script Permissions
        run: |
          ls -la scripts/*.sh

  # ============================================
  # Job 5: Documentation Check
  # ============================================
  docs:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README exists
        run: |
          test -f README.md || (echo "README.md not found" && exit 1)

      - name: Check Documentation
        run: |
          test -f CI_CD_GUIDE.md || (echo "CI_CD_GUIDE.md not found" && exit 1)
          test -f AGENTS.md || (echo "AGENTS.md not found" && exit 1)

  # ============================================
  # Job 6: Notify Results
  # ============================================
  notify:
    name: 📱 Notify Results
    runs-on: ubuntu-latest
    needs: [lint, terraform-validate, security, test-scripts, docs]
    if: always()
    steps:
      - name: Send Telegram Notification
        run: |
          STATUS="✅ PASSED"
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.terraform-validate.result }}" != "success" ] || [ "${{ needs.security.result }}" != "success" ]; then
            STATUS="❌ FAILED"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$STATUS *CI Pipeline*%0A%0AEvent: ${{ github.event_name }}%0ABranch: ${{ github.ref }}%0ACommit: ${{ github.sha }}%0A%0AJobs:%0A• Lint: ${{ needs.lint.result }}%0A• Terraform: ${{ needs.terraform-validate.result }}%0A• Security: ${{ needs.security.result }}%0A• Tests: ${{ needs.test-scripts.result }}%0A• Docs: ${{ needs.docs.result }}%0A%0A🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Publish CI Summary
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          ## CI Pipeline Results

          | Job | Status |
          |-----|--------|
          | Lint | ${{ needs.lint.result }} |
          | Terraform | ${{ needs.terraform-validate.result }} |
          | Security | ${{ needs.security.result }} |
          | Test Scripts | ${{ needs.test-scripts.result }} |
          | Documentation | ${{ needs.docs.result }} |

          🔗 [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
