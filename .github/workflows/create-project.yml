name: Create Project - VPS Gateway

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Nombre del proyecto (solo minúsculas, números y guiones)'
        required: true
        type: string
      client_name:
        description: 'Nombre del cliente VPN'
        required: true
        type: string
      local_port:
        description: 'Puerto local del servicio'
        required: true
        default: '5678'
        type: string

env:
  VPS_IP: 195.26.244.180
  VPS_USER: usuario
  DOMAIN: vps1.dgetahgo.edu.mx
  TELEGRAM_BOT_TOKEN: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
  TELEGRAM_CHAT_ID: "${{ secrets.TELEGRAM_CHAT_ID }}"

jobs:
  notify-start:
    name: 📱 Notificar Inicio
    runs-on: ubuntu-latest
    steps:
      - name: Notificar inicio de pipeline
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🚀 *VPS Gateway - Creación de Proyecto*%0A%0A📋 Proyecto: ${{ github.event.inputs.project_name }}%0A👤 Cliente: ${{ github.event.inputs.client_name }}%0A🔌 Puerto: ${{ github.event.inputs.local_port }}%0A%0A⏳ Iniciando pipeline...%0A🔄 Job 1/3: Terraform DNS" \
            -d "parse_mode=Markdown" 2>/dev/null || true

  terraform-dns:
    name: 🌍 Crear Registros DNS
    runs-on: ubuntu-latest
    needs: notify-start
    outputs:
      acme_fulldomain: ${{ steps.acme.outputs.fulldomain }}
      acme_subdomain: ${{ steps.acme.outputs.subdomain }}
      acme_username: ${{ steps.acme.outputs.username }}
      acme_password: ${{ steps.acme.outputs.password }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notificar inicio Terraform
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=⚙️ *Job 1/3: Terraform DNS*%0A%0A🔧 Configurando AWS credentials..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Notificar obtención ACME
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🔐 Obteniendo credenciales ACME-DNS..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Get ACME-DNS Credentials
        id: acme
        run: |
          ACME_RESPONSE=$(curl -sk -X POST "https://auth.dgetahgo.edu.mx:8444/register" 2>/dev/null)
          if [[ -z "$ACME_RESPONSE" || "$ACME_RESPONSE" != *"fulldomain"* ]]; then
            echo "Error obteniendo credenciales acme-dns"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=❌ *Error:* No se pudieron obtener credenciales ACME-DNS" \
              -d "parse_mode=Markdown" 2>/dev/null || true
            exit 1
          fi
          echo "fulldomain=$(echo "$ACME_RESPONSE" | jq -r '.fulldomain')" >> $GITHUB_OUTPUT
          echo "subdomain=$(echo "$ACME_RESPONSE" | jq -r '.subdomain')" >> $GITHUB_OUTPUT
          echo "username=$(echo "$ACME_RESPONSE" | jq -r '.username')" >> $GITHUB_OUTPUT
          echo "password=$(echo "$ACME_RESPONSE" | jq -r '.password')" >> $GITHUB_OUTPUT

      - name: Notificar generación de variables
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=📝 Generando variables Terraform..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Generate Terraform Variables
        run: |
          cat > terraform/project.tfvars << EOF
          subdomains = {
            "${{ github.event.inputs.project_name }}" = {
              name    = "${{ github.event.inputs.project_name }}.${{ env.DOMAIN }}"
              type    = "A"
              ttl     = 300
              records = ["${{ env.VPS_IP }}"]
            }
          }
          acme_challenges = {
            "_acme-challenge.${{ github.event.inputs.project_name }}.${{ env.DOMAIN }}" = "${{ steps.acme.outputs.fulldomain }}."
          }
          EOF

      - name: Notificar Terraform Init
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🚀 Ejecutando terraform init..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Terraform Init
        run: cd terraform && terraform init

      - name: Notificar Terraform Apply
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=⬆️ Aplicando cambios en AWS Route 53..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Terraform Apply
        run: cd terraform && terraform apply -var-file=project.tfvars -auto-approve

      - name: Notificar espera DNS
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=⏳ Esperando propagación DNS (60-90 segundos)..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Wait for DNS Propagation
        run: |
          for i in {1..12}; do
            CNAME_CHECK=$(dig +short "_acme-challenge.${{ github.event.inputs.project_name }}.${{ env.DOMAIN }}" CNAME @8.8.8.8 || echo "")
            if [[ "$CNAME_CHECK" == *"auth.dgetahgo.edu.mx"* ]]; then
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d "text=✅ DNS propagado correctamente" \
                -d "parse_mode=Markdown" 2>/dev/null || true
              exit 0
            fi
            sleep 10
          done
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=⚠️ DNS no se propagó completamente, continuando..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Notificar éxito Terraform
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ *Job 1/3 Completado: Terraform DNS*%0A%0A🌍 Registros DNS creados:%0A• A: ${{ github.event.inputs.project_name }}.${{ env.DOMAIN }}%0A• CNAME: _acme-challenge...%0A%0A🔄 Job 2/3: VPS Setup" \
            -d "parse_mode=Markdown" 2>/dev/null || true

  vps-setup:
    name: 🖥️ Configurar VPS
    runs-on: ubuntu-latest
    needs: terraform-dns
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notificar inicio VPS
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=⚙️ *Job 2/3: VPS Setup*%0A%0A🔧 Configurando SSH..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Notificar conexión SSH
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🔑 Conectando a VPS (${{ env.VPS_IP }})..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ env.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Notificar creación VPN
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🔐 Creando cliente VPN: ${{ github.event.inputs.client_name }}..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Prepare ACME Credentials
        run: |
          cat > /tmp/acme-credentials.json << EOF
          {
            "username": "${{ needs.terraform-dns.outputs.acme_username }}",
            "password": "${{ needs.terraform-dns.outputs.acme_password }}",
            "fulldomain": "${{ needs.terraform-dns.outputs.acme_fulldomain }}",
            "subdomain": "${{ needs.terraform-dns.outputs.acme_subdomain }}"
          }
          EOF

      - name: Notificar generación SSL
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🔒 Generando certificado SSL con Let's Encrypt..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Execute VPS Setup
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_IP }} "sudo bash /opt/projects/scripts/create-project-vps.sh --project=${{ github.event.inputs.project_name }} --client=${{ github.event.inputs.client_name }} --port=${{ github.event.inputs.local_port }} --acme-file=/tmp/acme-credentials.json" || {
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=❌ *Error en VPS Setup*%0A%0ARevisa los logs en el servidor" \
              -d "parse_mode=Markdown" 2>/dev/null || true
            exit 1
          }

      - name: Notificar éxito VPS
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=✅ *Job 2/3 Completado: VPS Setup*%0A%0A🖥️ Configuración VPS:%0A• VPN: ${{ github.event.inputs.client_name }}%0A• SSL: ${{ github.event.inputs.project_name }}.${{ env.DOMAIN }}%0A• Nginx: Proxy configurado%0A%0A🔄 Job 3/3: Verificación Final" \
            -d "parse_mode=Markdown" 2>/dev/null || true

  verify:
    name: ✅ Verificación Final
    runs-on: ubuntu-latest
    needs: [terraform-dns, vps-setup]
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ env.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Notificar verificación
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🔍 *Job 3/3: Verificación Final*%0A%0AVerificando componentes..." \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Verify Setup
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_IP }} "sudo nginx -t && sudo systemctl is-active nginx" && \
          ssh ${{ env.VPS_USER }}@${{ env.VPS_IP }} "sudo test -f /etc/letsencrypt/live/${{ github.event.inputs.project_name }}.${{ env.DOMAIN }}/fullchain.pem" && \
          ssh ${{ env.VPS_USER }}@${{ env.VPS_IP }} "sudo test -f /opt/openvpn/data/ccd/${{ github.event.inputs.client_name }}"

      - name: Notificar proyecto completado
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🎉 *PROYECTO CREADO EXITOSAMENTE*%0A%0A✅ Job 3/3 Completado%0A%0A📋 Resumen:%0A• Proyecto: ${{ github.event.inputs.project_name }}%0A• Cliente: ${{ github.event.inputs.client_name }}%0A• URL: https://${{ github.event.inputs.project_name }}.${{ env.DOMAIN }}%0A• Puerto: ${{ github.event.inputs.local_port }}%0A%0A📝 Pasos siguientes:%0A1. Descargar .ovpn desde artifacts%0A2. Conectar: sudo openvpn --config ${{ github.event.inputs.client_name }}.ovpn%0A3. Iniciar servicio en puerto ${{ github.event.inputs.local_port }}%0A4. Acceder a la URL" \
            -d "parse_mode=Markdown" 2>/dev/null || true

      - name: Upload VPN Config Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-config-${{ github.event.inputs.client_name }}
          path: /home/usuario/vpn-clients/${{ github.event.inputs.client_name }}.ovpn
          if-no-files-found: warn

  notify-completion:
    name: 📱 Notificar Finalización
    runs-on: ubuntu-latest
    needs: [terraform-dns, vps-setup, verify]
    if: always()
    steps:
      - name: Notificar estado final
        run: |
          if [ "${{ needs.terraform-dns.result }}" == "success" ] && [ "${{ needs.vps-setup.result }}" == "success" ] && [ "${{ needs.verify.result }}" == "success" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=✅ *Pipeline Completado*%0A%0ATodos los jobs finalizaron correctamente.%0A%0A🔗 Repositorio: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              -d "parse_mode=Markdown" 2>/dev/null || true
          else
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=❌ *Pipeline Fallido*%0A%0AAlgunos jobs no completaron correctamente.%0A%0A🔗 Revisa los logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              -d "parse_mode=Markdown" 2>/dev/null || true
          fi