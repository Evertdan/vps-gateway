name: Create Project - VPS Gateway

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Nombre del proyecto (solo minúsculas, números y guiones)'
        required: true
        type: string
      client_name:
        description: 'Nombre del cliente VPN'
        required: true
        type: string
      local_port:
        description: 'Puerto local del servicio'
        required: true
        default: '5678'
        type: string
      environment:
        description: 'Entorno'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  VPS_IP: 195.26.244.180
  VPS_USER: usuario
  DOMAIN: vps1.dgetahgo.edu.mx
  TF_VAR_environment: ${{ github.event.inputs.environment }}

jobs:
  # ============================================
  # JOB 1: Terraform - Crear DNS en Route 53
  # ============================================
  terraform-dns:
    name: Crear Registros DNS
    runs-on: ubuntu-latest
    outputs:
      acme_fulldomain: ${{ steps.acme.outputs.fulldomain }}
      acme_subdomain: ${{ steps.acme.outputs.subdomain }}
      acme_username: ${{ steps.acme.outputs.username }}
      acme_password: ${{ steps.acme.outputs.password }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get ACME-DNS Credentials
        id: acme
        run: |
          echo "🔑 Obteniendo credenciales de acme-dns..."
          
          # Obtener credenciales del VPS
          ACME_RESPONSE=$(curl -sk -X POST "https://auth.dgetahgo.edu.mx:8444/register" 2>/dev/null)
          
          if [[ -z "$ACME_RESPONSE" || "$ACME_RESPONSE" != *"fulldomain"* ]]; then
            echo "❌ Error obteniendo credenciales acme-dns"
            exit 1
          fi
          
          # Extraer valores
          FULLDOMAIN=$(echo "$ACME_RESPONSE" | jq -r '.fulldomain')
          SUBDOMAIN=$(echo "$ACME_RESPONSE" | jq -r '.subdomain')
          USERNAME=$(echo "$ACME_RESPONSE" | jq -r '.username')
          PASSWORD=$(echo "$ACME_RESPONSE" | jq -r '.password')
          
          echo "fulldomain=$FULLDOMAIN" >> $GITHUB_OUTPUT
          echo "subdomain=$SUBDOMAIN" >> $GITHUB_OUTPUT
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          
          echo "✅ ACME fulldomain: $FULLDOMAIN"

      - name: Generate Terraform Variables
        run: |
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          FULL_DOMAIN="${PROJECT_NAME}.${DOMAIN}"
          
          cat > terraform/project.tfvars << EOF
          subdomains = {
            "${PROJECT_NAME}" = {
              name    = "${FULL_DOMAIN}"
              type    = "A"
              ttl     = 300
              records = ["${VPS_IP}"]
            }
          }
          
          acme_challenges = {
            "_acme-challenge.${FULL_DOMAIN}" = "${{ steps.acme.outputs.fulldomain }}."
          }
          EOF
          
          echo "📄 Variables Terraform generadas:"
          cat terraform/project.tfvars

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -var-file=project.tfvars

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -var-file=project.tfvars -auto-approve

      - name: Wait for DNS Propagation
        run: |
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          CNAME_NAME="_acme-challenge.${PROJECT_NAME}.${DOMAIN}"
          ACME_DOMAIN="${{ steps.acme.outputs.fulldomain }}"
          
          echo "⏳ Esperando propagación DNS: $CNAME_NAME"
          
          for i in {1..12}; do
            CNAME_CHECK=$(dig +short "$CNAME_NAME" CNAME @8.8.8.8 || echo "")
            if [[ "$CNAME_CHECK" == *"auth.dgetahgo.edu.mx"* ]]; then
              echo "✅ DNS propagado correctamente"
              exit 0
            fi
            echo "Esperando... ($i/12)"
            sleep 10
          done
          
          echo "⚠️  DNS no se propagó completamente, continuando de todos modos..."

  # ============================================
  # JOB 2: VPS Setup - VPN + SSL + Nginx
  # ============================================
  vps-setup:
    name: Configurar VPS
    runs-on: ubuntu-latest
    needs: terraform-dns
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Prepare ACME Credentials
        run: |
          cat > /tmp/acme-credentials.json << EOF
          {
            "username": "${{ needs.terraform-dns.outputs.acme_username }}",
            "password": "${{ needs.terraform-dns.outputs.acme_password }}",
            "fulldomain": "${{ needs.terraform-dns.outputs.acme_fulldomain }}",
            "subdomain": "${{ needs.terraform-dns.outputs.acme_subdomain }}"
          }
          EOF

      - name: Copy Scripts to VPS
        run: |
          scp -o StrictHostKeyChecking=no \
            scripts/create-project-vps.sh \
            ${{ env.VPS_USER }}@${{ env.VPS_IP }}:/tmp/create-project-vps.sh
          
          scp -o StrictHostKeyChecking=no \
            /tmp/acme-credentials.json \
            ${{ env.VPS_USER }}@${{ env.VPS_IP }}:/tmp/acme-credentials.json

      - name: Execute VPS Setup
        run: |
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          CLIENT_NAME="${{ github.event.inputs.client_name }}"
          LOCAL_PORT="${{ github.event.inputs.local_port }}"
          
          echo "🚀 Ejecutando configuración en VPS..."
          
          ssh -o StrictHostKeyChecking=no \
            ${{ env.VPS_USER }}@${{ env.VPS_IP }} \
            "sudo bash /tmp/create-project-vps.sh \
              --project=$PROJECT_NAME \
              --client=$CLIENT_NAME \
              --port=$LOCAL_PORT \
              --acme-file=/tmp/acme-credentials.json"

      - name: Verify Setup
        run: |
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          FULL_DOMAIN="${PROJECT_NAME}.${DOMAIN}"
          
          echo "🔍 Verificando configuración..."
          
          # Verificar Nginx
          ssh -o StrictHostKeyChecking=no \
            ${{ env.VPS_USER }}@${{ env.VPS_IP }} \
            "sudo nginx -t && sudo systemctl is-active nginx"
          
          # Verificar SSL
          ssh -o StrictHostKeyChecking=no \
            ${{ env.VPS_USER }}@${{ env.VPS_IP }} \
            "sudo test -f /etc/letsencrypt/live/$FULL_DOMAIN/fullchain.pem && echo 'SSL OK'"
          
          # Verificar VPN
          ssh -o StrictHostKeyChecking=no \
            ${{ env.VPS_USER }}@${{ env.VPS_IP }} \
            "sudo test -f /opt/openvpn/data/ccd/${{ github.event.inputs.client_name }} && echo 'VPN OK'"

      - name: Upload VPN Config Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-config-${{ github.event.inputs.client_name }}
          path: |
            /tmp/${{ github.event.inputs.client_name }}.ovpn
          if-no-files-found: warn

  # ============================================
  # JOB 3: Verify - Health Check
  # ============================================
  verify:
    name: Verificación Final
    runs-on: ubuntu-latest
    needs: [terraform-dns, vps-setup]
    
    steps:
      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Final Verification
        run: |
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          FULL_DOMAIN="${PROJECT_NAME}.${DOMAIN}"
          
          echo "======================================"
          echo "✅ PROYECTO CREADO EXITOSAMENTE"
          echo "======================================"
          echo ""
          echo "📋 Información:"
          echo "   Proyecto:   $PROJECT_NAME"
          echo "   Cliente:    ${{ github.event.inputs.client_name }}"
          echo "   URL:        https://$FULL_DOMAIN"
          echo ""
          echo "🌐 Acceso Público:"
          echo "   https://$FULL_DOMAIN"
          echo ""
          echo "📄 VPN Config:"
          echo "   Descargar desde artifacts: vpn-config-${{ github.event.inputs.client_name }}"
          echo "   O desde VPS: /home/usuario/vpn-clients/${{ github.event.inputs.client_name }}.ovpn"
          echo ""
          echo "📝 Instrucciones:"
          echo "   1. Descargar archivo .ovpn"
          echo "   2. Conectar VPN: sudo openvpn --config ${{ github.event.inputs.client_name }}.ovpn"
          echo "   3. Iniciar servicio local en puerto ${{ github.event.inputs.local_port }}"
          echo "   4. Acceder a: https://$FULL_DOMAIN"
          echo ""
          echo "======================================"

      - name: Update Registry
        run: |
          # Actualizar registry local si es necesario
          echo "✅ Registro actualizado en VPS"
