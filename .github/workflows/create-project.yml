name: Create Project - VPS Gateway

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Nombre del proyecto (solo minúsculas, números y guiones)'
        required: true
        type: string
      client_name:
        description: 'Nombre del cliente VPN'
        required: true
        type: string
      local_port:
        description: 'Puerto local del servicio'
        required: true
        default: '5678'
        type: string

env:
  VPS_IP: 195.26.244.180
  VPS_USER: usuario
  DOMAIN: vps1.dgetahgo.edu.mx

jobs:
  terraform-dns:
    name: Crear Registros DNS
    runs-on: ubuntu-latest
    outputs:
      acme_fulldomain: ${{ steps.acme.outputs.fulldomain }}
      acme_subdomain: ${{ steps.acme.outputs.subdomain }}
      acme_username: ${{ steps.acme.outputs.username }}
      acme_password: ${{ steps.acme.outputs.password }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get ACME-DNS Credentials
        id: acme
        run: |
          ACME_RESPONSE=$(curl -sk -X POST "https://auth.dgetahgo.edu.mx:8444/register" 2>/dev/null)
          if [[ -z "$ACME_RESPONSE" || "$ACME_RESPONSE" != *"fulldomain"* ]]; then
            echo "Error obteniendo credenciales acme-dns"
            exit 1
          fi
          echo "fulldomain=$(echo "$ACME_RESPONSE" | jq -r '.fulldomain')" >> $GITHUB_OUTPUT
          echo "subdomain=$(echo "$ACME_RESPONSE" | jq -r '.subdomain')" >> $GITHUB_OUTPUT
          echo "username=$(echo "$ACME_RESPONSE" | jq -r '.username')" >> $GITHUB_OUTPUT
          echo "password=$(echo "$ACME_RESPONSE" | jq -r '.password')" >> $GITHUB_OUTPUT

      - name: Generate Terraform Variables
        run: |
          cat > terraform/project.tfvars << EOF
          subdomains = {
            "${{ github.event.inputs.project_name }}" = {
              name    = "${{ github.event.inputs.project_name }}.${{ env.DOMAIN }}"
              type    = "A"
              ttl     = 300
              records = ["${{ env.VPS_IP }}"]
            }
          }
          acme_challenges = {
            "_acme-challenge.${{ github.event.inputs.project_name }}.${{ env.DOMAIN }}" = "${{ steps.acme.outputs.fulldomain }}."
          }
          EOF

      - name: Terraform Init
        run: cd terraform && terraform init

      - name: Terraform Apply
        run: cd terraform && terraform apply -var-file=project.tfvars -auto-approve

  vps-setup:
    name: Configurar VPS
    runs-on: ubuntu-latest
    needs: terraform-dns
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ env.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Execute VPS Setup
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_IP }} "echo 'Setup completo'"